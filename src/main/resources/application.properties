spring.application.name=backend
server.port=8080

logging.level.org.springframework.security=WARN
logging.level.org.springframework.boot.env=WARN
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

spring.jpa.open-in-view=false

# ===============================
# DATASOURCE - AIVEN MYSQL
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${PASSWORD_BD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

google.credentials.path=google-credentials.json

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=VARCHAR

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.pool-name=ReporteloPool

# Batch Inserts
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# Brevo API HTTP (variables leidas directamente del entorno)
recaptcha.secret.key=${RECAPTCHA_SECRET_KEY}
recaptcha.score.threshold=0.5

jwt.secret.key=${JWT_SECRET_KEY}

jwt.expiration.base.ms=3600000
jwt.multiplier.admin=120
jwt.multiplier.agente=120
jwt.multiplier.ciudadano=5

# Tamaño máximo archivo
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta configurable
app.upload.dir=/tmp/uploads
app.base-url=https://reporteloya-backend.onrender.com

# Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# Verificación de correo
app.verification.url=https://www.report-elo.com/verificar-correo

# Recuperación de contraseña
app.password.reset.url=https://www.report-elo.com/password

# Cookie settings (override in production: APP_COOKIE_SECURE=true, APP_COOKIE_SAME_SITE=None)
app.cookie.secure=false
app.cookie.same-site=Lax

# OWASP A02 - Encriptación de campos PII en BD
# Generar con: openssl rand -base64 32
# Dejar vacío para deshabilitar encriptación (desarrollo local sin clave)
app.encryption.key=${DB_ENCRYPTION_KEY:}

# Producción: validar esquema sin modificarlo
# Activar con: spring.profiles.active=prod
#
# spring.jpa.hibernate.ddl-auto=validate

# Seeder - Usuario admin por defecto (configurar en Render)
admin.email=${ADMIN_EMAIL:admin@reporteloya.gov.co}
admin.password=${ADMIN_PASSWORD:}
admin.nombre=${ADMIN_NOMBRE:Administrador Principal}